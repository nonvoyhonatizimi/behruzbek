services:
  - type: web
    name: nonvoyhona-tizimi
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/behruzbek.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
